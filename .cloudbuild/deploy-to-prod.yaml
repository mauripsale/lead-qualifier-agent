steps:
  # Build Docker Image for PRODUCTION (Active on Release Tag v*)
  - name: "gcr.io/cloud-builders/docker"
    id: build-image
    args:
      [
        "build",
        "-t",
        "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$TAG_NAME",
        "--build-arg",
        "COMMIT_SHA=$COMMIT_SHA",
        ".",
      ]
      
  # Push Docker Image to Artifact Registry (PRODUCTION)
  - name: "gcr.io/cloud-builders/docker"
    id: push-image
    args:
      [
        "push",
        "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$TAG_NAME",
      ]

  # Deploy to PROD on Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-prod
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "randstad-adk-prod"
      - "--image"
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$TAG_NAME"
      - "--region"
      - "${_REGION}"
      - "--project"
      - "${PROJECT_ID}"
      - "--allow-unauthenticated"

substitutions:
  _REGION: us-central1
  _CONTAINER_NAME: randstad-adk

logsBucket: gs://${PROJECT_ID}-randstad-adk-logs/build-logs
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
