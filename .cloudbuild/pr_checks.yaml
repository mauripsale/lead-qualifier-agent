steps:
  # Install uv package manager and sync dependencies
  - name: "python:3.12-slim"
    id: install-dependencies
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        pip install uv==0.8.13 --user && uv sync --locked
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Run unit tests using pytest
  - name: "python:3.12-slim"
    id: unit-tests
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        uv run pytest tests/unit -v
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # Run ADK Evaluation tests
  - name: "python:3.12-slim"
    id: eval-tests
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        uv sync --dev --extra eval
        uv run adk eval ./app tests/eval/evalsets/lead_qualifier.evalset.json --config_file_path=tests/eval/eval_config.json
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - 'GOOGLE_CLOUD_LOCATION=global'
      - 'GOOGLE_GENAI_USE_VERTEXAI=True'

  # Build Docker Image for DEV environment
  - name: "gcr.io/cloud-builders/docker"
    id: build-image
    args:
      [
        "build",
        "-t",
        "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME-dev:$COMMIT_SHA",
        "--build-arg",
        "COMMIT_SHA=$COMMIT_SHA",
        ".",
      ]
      
  # Push Docker Image to Artifact Registry (DEV)
  - name: "gcr.io/cloud-builders/docker"
    id: push-image
    args:
      [
        "push",
        "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME-dev:$COMMIT_SHA",
      ]

  # Deploy to DEV on Cloud Run (Same GCP Project)
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-dev
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "randstad-adk-dev"
      - "--image"
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME-dev:$COMMIT_SHA"
      - "--region"
      - "${_REGION}"
      - "--project"
      - "${PROJECT_ID}"
      - "--allow-unauthenticated"
      - "--tag"
      - "pr-${_PR_NUMBER}"
      - "--env-vars-file"
      - "conf/dev/.env"

substitutions:
  _ARTIFACT_REGISTRY_REPO_NAME: randstad-adk-repo-dev
  _REGION: europe-west2
  _CONTAINER_NAME: randstad-adk

logsBucket: gs://${PROJECT_ID}-randstad-adk-logs/build-logs
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
