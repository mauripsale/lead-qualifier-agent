steps:
  # 1) Install uv package manager and sync dependencies
  - name: "python:3.12-slim"
    id: install-dependencies
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        pip install uv==0.8.13 && uv sync --locked
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # 2) Run unit test
  - name: "python:3.12-slim"
    id: unit-tests
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        uv run pytest tests/unit -v
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # 3) Fa il build dell'immagine
  - name: "gcr.io/cloud-builders/docker"
    id: build-image
    args:
      - "build"
      - "-t"
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME-dev:$COMMIT_SHA"
      - "."

  # 4) Verifica che l'infrastruttura creata con terraform sia pronta e se non lo e' la crea.
  - name: "hashicorp/terraform:1.5.0"
    id: terraform-infra
    entrypoint: /bin/sh
    args:
      - "-c"
      - |
        cd deployment/terraform
        terraform init -backend-config="bucket=$PROJECT_ID-tfstate" -backend-config="prefix=terraform/state/dev" -reconfigure
        terraform apply -var-file=vars/dev.tfvars -var="project_id=$PROJECT_ID" -auto-approve

  # 5) Esegue il push dell'immagine verso il repo in Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: push-image
    args:
      - "push"
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME-dev:$COMMIT_SHA"

  # 6) Esegue il deploy dell'app in Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-app
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        gcloud beta run deploy $_SERVICE_NAME-dev \
          --image $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME-dev:$COMMIT_SHA \
          --region $_REGION \
          --project $PROJECT_ID \
          --no-allow-unauthenticated \
          --service-account "$_SERVICE_NAME-app-dev@$PROJECT_ID.iam.gserviceaccount.com" \
          --max-instances 10 \
          --min-instances 0 \
          --session-affinity \
          --update-env-vars "FIRESTORE_DATABASE_ID=lead-qualifier-db-dev,LOGS_BUCKET_NAME=$PROJECT_ID-$_SERVICE_NAME-dev-logs,OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT=NO_CONTENT"

  # 7) Esegue una semplice verifica (tipo curl) per vedere se l'app e' in esecuzione
  - name: "gcr.io/cloud-builders/gcloud"
    id: verify-deployment
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        SERVICE_URL=$(gcloud run services describe $_SERVICE_NAME-dev --platform managed --region $_REGION --format 'value(status.url)')
        echo "Verifying service at $SERVICE_URL"
        # Usiamo l'ID Token per l'autenticazione visto che il servizio non è pubblico
        curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $(gcloud auth print-identity-token)" $SERVICE_URL/health | grep 200

substitutions:
  _REPO_NAME: randstad-adk-repo-dev
  _REGION: us-central1
  _SERVICE_NAME: randstad-adk

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY
