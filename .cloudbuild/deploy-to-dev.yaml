steps:
  # 1) Install dependencies using the official uv image
  # We use the same image for subsequent steps to ensure uv is available
  - name: "python:3.12-slim"
    id: install-dependencies
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        pip install uv==0.8.13 --user && uv sync --locked
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  #2) Run unit tests using pytest
  - name: "python:3.12-slim"
    id: unit-tests
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        uv run pytest tests/unit -v
    env:
      - 'PATH=/usr/local/bin:/usr/bin:~/.local/bin'

  # 3) Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: build-image
    args:
      - "build"
      - "-t"
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_PROJECT_NAME-dev:$COMMIT_SHA"
      - "."

  # 4) Push the image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: push-image
    args:
      - "push"
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_PROJECT_NAME-dev:$COMMIT_SHA"

  # 5) Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-app
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        gcloud beta run deploy $_PROJECT_NAME-dev \
          --image $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_PROJECT_NAME-dev:$COMMIT_SHA \
          --region $_REGION \
          --project $PROJECT_ID \
          --no-allow-unauthenticated \
          --service-account "$_PROJECT_NAME-app-dev@$PROJECT_ID.iam.gserviceaccount.com" \
          --max-instances 10 \
          --min-instances 0 \
          --update-env-vars "FIRESTORE_DATABASE_ID=lead-qualifier-db-dev,LOGS_BUCKET_NAME=$PROJECT_ID-$_PROJECT_NAME-dev-logs,OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT=NO_CONTENT,ALLOW_ORIGINS=*,GOOGLE_GENAI_USE_VERTEXAI=True,GOOGLE_CLOUD_LOCATION=global"


substitutions:
  _REPO_NAME: randstad-adk-repo-dev
  _REGION: us-central1
  _PROJECT_NAME: randstad-adk

logsBucket: "gs://$PROJECT_ID-$_PROJECT_NAME-dev-logs"

options:
  substitutionOption: ALLOW_LOOSE
